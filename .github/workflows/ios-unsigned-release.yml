name: iOS Unsigned Release Build

on:
  push:
    tags:
      - 'v*' # Triggers on any tag starting with v (e.g. v1.0.0)
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-26

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        lfs: true

    - name: Determine Version
      run: |
        if [ "${{ github.ref_type }}" = "tag" ]; then
          TAG_NAME="${{ github.ref_name }}"
          VERSION="${TAG_NAME#v}"
          echo "APP_DISPLAY_VERSION=$VERSION" >> $GITHUB_ENV
        else
          echo "APP_DISPLAY_VERSION=0.0.0-dev" >> $GITHUB_ENV
        fi
        echo "APP_BUILD_NUMBER=${{ github.run_number }}" >> $GITHUB_ENV

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '26.4.1'

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Install MAUI Workloads
      run: dotnet workload restore

    - name: Publish iOS app (Unsigned)
      run: |
        dotnet publish Mogri/Mogri.csproj -f net10.0-ios -c Release -p:RuntimeIdentifier=ios-arm64 -p:EnableCodeSigning=false -p:ApplicationDisplayVersion=$APP_DISPLAY_VERSION -p:ApplicationVersion=$APP_BUILD_NUMBER

    - name: Package IPA and Zip
      run: |
        cd Mogri/bin/Release/net10.0-ios/ios-arm64/
        # Create Payload directory structure required for an IPA
        mkdir Payload
        # Move the built .app package into the Payload directory
        mv Mogri.app Payload/
        # Zip it up (this creates the standard IPA structure)
        zip -r Payload.zip Payload
        # Duplicate/rename to create the final .ipa file
        cp Payload.zip Mogri-v${APP_DISPLAY_VERSION}-iOS-Unsigned.ipa

    - name: Upload Unsigned IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Mogri-v${{ env.APP_DISPLAY_VERSION }}-iOS-Unsigned-IPA
        path: Mogri/bin/Release/net10.0-ios/ios-arm64/Mogri-v${{ env.APP_DISPLAY_VERSION }}-iOS-Unsigned.ipa

    - name: Upload Payload Zip Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Mogri-v${{ env.APP_DISPLAY_VERSION }}-iOS-Payload-Zip
        path: Mogri/bin/Release/net10.0-ios/ios-arm64/Payload.zip
