name: Android Release Build

on:
  push:
    tags:
      - 'v*' # Triggers on any tag starting with v (e.g. v1.0.0)
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        lfs: true

    - name: Determine Version
      run: |
        if ("${{ github.ref_type }}" -eq "tag") {
          $tag = "${{ github.ref_name }}"
          if ($tag.StartsWith("v")) {
            $version = $tag.Substring(1)
          } else {
            $version = $tag
          }
          echo "APP_DISPLAY_VERSION=$version" >> $env:GITHUB_ENV
        } else {
          echo "APP_DISPLAY_VERSION=0.0.0-dev" >> $env:GITHUB_ENV
        }
        echo "APP_BUILD_NUMBER=${{ github.run_number }}" >> $env:GITHUB_ENV

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Install MAUI Workloads
      run: dotnet workload restore

    - name: Decode Keystore
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        $keystoreBytes = [System.Convert]::FromBase64String($env:KEYSTORE_BASE64)
        [IO.File]::WriteAllBytes("$env:GITHUB_WORKSPACE\mogri.keystore", $keystoreBytes)
      shell: pwsh

    - name: Publish Android APK and AAB
      run: >
        dotnet publish Mogri/Mogri.csproj -f net10.0-android -c Release
        -p:AndroidKeyStore=true
        -p:AndroidSigningKeyStore="$env:GITHUB_WORKSPACE\mogri.keystore"
        -p:AndroidSigningKeyAlias="${{ secrets.KEY_ALIAS }}"
        -p:AndroidSigningKeyPass="${{ secrets.KEY_PASSWORD }}"
        -p:AndroidSigningStorePass="${{ secrets.KEYSTORE_PASSWORD }}"
        -p:ApplicationDisplayVersion=$env:APP_DISPLAY_VERSION
        -p:ApplicationVersion=$env:APP_BUILD_NUMBER

    - name: Rename Artifacts
      run: |
        $publishDir = "Mogri/bin/Release/net10.0-android/publish"
        $apk = Get-ChildItem -Path $publishDir -Recurse -Filter "*-Signed.apk" | Select-Object -First 1
        $aab = Get-ChildItem -Path $publishDir -Recurse -Filter "*-Signed.aab" | Select-Object -First 1
        if ($apk) {
          $dest = Join-Path $apk.DirectoryName "Mogri-v$env:APP_DISPLAY_VERSION-Android-Signed.apk"
          Move-Item $apk.FullName $dest
          echo "APK_PATH=$dest" >> $env:GITHUB_ENV
        }
        if ($aab) {
          $dest = Join-Path $aab.DirectoryName "Mogri-v$env:APP_DISPLAY_VERSION-Android-Signed.aab"
          Move-Item $aab.FullName $dest
          echo "AAB_PATH=$dest" >> $env:GITHUB_ENV
        }
      shell: pwsh

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Mogri-Android-APK-v${{ env.APP_DISPLAY_VERSION }}
        path: ${{ env.APK_PATH }}

    - name: Upload AAB Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Mogri-Android-AAB-v${{ env.APP_DISPLAY_VERSION }}
        path: ${{ env.AAB_PATH }}
