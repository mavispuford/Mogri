name: PR Build Verification

on:
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - 'LICENSE'
      - 'Licenses/**'
      - 'Media/**'
      - 'Scripts/**'

concurrency:
  group: pr-${{ github.event.number }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify-android:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Install MAUI Workloads
      run: dotnet workload install maui-android

    - name: Build Android (Debug, No Signing)
      run: >
        dotnet build Mogri/Mogri.csproj -f net10.0-android -c Debug
        -p:TargetFrameworks=net10.0-android
        -p:ApplicationDisplayVersion=0.0.0
        -p:ApplicationVersion=${{ github.run_number }}

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: Mogri-Android-Debug-PR${{ github.event.number }}
        path: Mogri/bin/Debug/net10.0-android/**/*-Signed.apk
        retention-days: 3

  verify-ios:
    runs-on: macos-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '26.2'

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Install MAUI Workloads
      run: dotnet workload install maui-ios

    - name: Build iOS (Debug, No Signing)
      run: >
        dotnet build Mogri/Mogri.csproj -f net10.0-ios -c Debug
        -p:TargetFrameworks=net10.0-ios
        -p:RuntimeIdentifier=ios-arm64
        -p:EnableCodeSigning=false
        -p:ApplicationDisplayVersion=0.0.0
        -p:ApplicationVersion=${{ github.run_number }}
